apiVersion: v1
kind: Pod
metadata:
  name: init-demo
  namespace: apache
spec:
  volumes:
  - name: shared-data
    emptyDir: {}

  initContainers:
  - name: init-download
    image: busybox
    command: ['sh', '-c', 'echo Config ready > /data/config.txt']
    volumeMounts:
    - name: shared-data
      mountPath: /data

  containers:
  - name: app
    image: nginx
    volumeMounts:
    - name: shared-data
      mountPath: /usr/share/nginx/html
